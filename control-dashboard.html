<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Control Dashboard</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f3f4f6;
        --card-bg: #ffffff;
        --text: #1f2933;
        --muted: #52606d;
        --border: #d2d6dc;
        --accent: #2563eb;
        --on: #15803d;
        --off: #dc2626;
        --error: #b45309;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111827;
          --card-bg: #1f2937;
          --text: #f9fafb;
          --muted: #9ca3af;
          --border: #374151;
          --accent: #60a5fa;
          --on: #22c55e;
          --off: #f87171;
          --error: #fbbf24;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        padding: 2rem clamp(1.25rem, 4vw, 4rem);
      }

      header {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        text-align: center;
      }

      header h1 {
        margin: 0;
        font-size: clamp(1.75rem, 4vw, 2.5rem);
        letter-spacing: 0.03em;
      }

      header p {
        margin: 0;
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 1.5rem;
        width: min(1100px, 100%);
        margin: 0 auto;
      }

      .station {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 1.5rem;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .station:hover {
        transform: translateY(-4px);
        box-shadow: 0 22px 45px rgba(15, 23, 42, 0.12);
      }

      .station h2 {
        margin: 0;
        font-size: 1.3rem;
        letter-spacing: 0.02em;
      }

      .status-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .indicator {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        border: 3px solid currentColor;
        transition: color 0.2s ease, box-shadow 0.2s ease;
      }

      .indicator[data-state="off"] {
        color: var(--off);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--off) 20%, transparent);
      }

      .indicator[data-state="on"] {
        color: var(--on);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--on) 20%, transparent);
      }

      .indicator[data-state="error"] {
        color: var(--error);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--error) 20%, transparent);
      }

      .status-label {
        font-weight: 600;
        letter-spacing: 0.03em;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
      }

      button {
        flex: 1 1 100px;
        padding: 0.55rem 0.9rem;
        border-radius: 0.65rem;
        border: 1px solid transparent;
        background: var(--accent);
        color: #fff;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        font-size: 0.85rem;
        cursor: pointer;
        transition: background 0.2s ease, transform 0.15s ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button[data-command="off"] {
        background: var(--off);
      }

      button[data-command="error"] {
        background: var(--error);
      }

      .status-details {
        margin: 0;
        color: var(--muted);
        font-size: 0.85rem;
      }

      .telemetry {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .telemetry-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.35rem 0.5rem;
        border-radius: 0.5rem;
        background: color-mix(in srgb, var(--accent) 7%, transparent);
      }

      .telemetry-label {
        font-weight: 600;
        letter-spacing: 0.03em;
      }

      .telemetry-value {
        font-variant-numeric: tabular-nums;
        font-weight: 700;
        color: var(--accent);
      }

      .telemetry-value.unavailable {
        color: var(--muted);
        font-weight: 600;
      }

      .telemetry-empty {
        margin: 0;
        font-size: 0.85rem;
        color: var(--muted);
        font-style: italic;
      }

      .strip-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .strip-list li {
        display: flex;
        justify-content: space-between;
        gap: 0.75rem;
        padding-bottom: 0.35rem;
        border-bottom: 1px solid var(--border);
      }

      .strip-list li:last-child {
        border-bottom: none;
      }

      .strip-label {
        font-weight: 500;
      }

      .strip-value {
        font-weight: 600;
        color: var(--accent);
        font-variant-numeric: tabular-nums;
      }

      .strip-value.unavailable {
        color: var(--muted);
        font-weight: 500;
      }

      footer {
        text-align: center;
        color: var(--muted);
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Power Station Control Dashboard</h1>
      <p>Monitor and manage the current state of each connected station.</p>
    </header>
    <main class="grid" id="dashboard"></main>
    <footer>
      Tap a command to send a request; indicators reflect device responses and
      refresh every 5 seconds.
    </footer>

    <template id="station-template">
      <article class="station">
        <header>
          <h2 class="station-name"></h2>
          <div class="status-row">
            <span class="indicator" data-state="off" aria-hidden="true"></span>
            <span class="status-label" data-label>OFF</span>
          </div>
        </header>
        <div class="controls">
          <button type="button" data-command="on">Turn On</button>
          <button type="button" data-command="off">Turn Off</button>
          <button type="button" data-command="error">Mark Error</button>
        </div>
        <p class="status-details" data-details hidden></p>
        <div class="telemetry">
          <div class="telemetry-row" data-total-current hidden>
            <span class="telemetry-label">Total Current</span>
            <span class="telemetry-value" data-total-current-value>--</span>
          </div>
          <ul class="strip-list" data-strip-list></ul>
          <p class="telemetry-empty" data-telemetry-empty hidden>
            No current telemetry available for this station.
          </p>
        </div>
      </article>
    </template>

    <script>
      const stations = [
        {
          id: "foh-power",
          name: "FOH Power",
          baseUrl: "http://foh-power.local"
        },
        {
          id: "stage-left",
          name: "Stage Left Power",
          baseUrl: "http://stage-left.local"
        },
        {
          id: "stage-right",
          name: "Stage Right Power",
          baseUrl: "http://stage-right.local"
        },
        {
          id: "amp-rack",
          name: "Amp Rack Power",
          baseUrl: "http://amp-rack.local"
        }
      ];

      const stateLabels = {
        on: "ON",
        off: "OFF",
        error: "ERROR"
      };

      const dashboard = document.getElementById("dashboard");
      const template = document.getElementById("station-template");

      const stationElements = new Map();

      const formatAmps = (value) => `${value.toFixed(2)} A`;

      const applyState = (element, state, details = "") => {
        const indicator = element.querySelector(".indicator");
        const label = element.querySelector("[data-label]");
        const normalized = state === "on" || state === "off" ? state : "error";
        indicator.dataset.state = normalized;
        label.textContent = stateLabels[normalized] ?? normalized.toUpperCase();

        const detailsNode = element.querySelector("[data-details]");
        if (!detailsNode) return;

        if (details && details.trim().length > 0) {
          detailsNode.textContent = details;
          detailsNode.hidden = false;
        } else {
          detailsNode.hidden = true;
          detailsNode.textContent = "";
        }
      };

      const applyTelemetry = (element, telemetry) => {
        const totalRow = element.querySelector("[data-total-current]");
        const totalValue = element.querySelector("[data-total-current-value]");
        const stripList = element.querySelector("[data-strip-list]");
        const emptyMessage = element.querySelector("[data-telemetry-empty]");

        if (stripList) {
          stripList.innerHTML = "";
          stripList.hidden = true;
        }

        if (emptyMessage) {
          emptyMessage.hidden = true;
        }

        const hasTelemetry =
          telemetry &&
          (Number.isFinite(telemetry.total) ||
            (Array.isArray(telemetry.strips) && telemetry.strips.length > 0));

        if (!hasTelemetry) {
          if (totalRow) {
            totalRow.hidden = true;
          }
          if (emptyMessage) {
            emptyMessage.hidden = false;
          }
          return;
        }

        if (Number.isFinite(telemetry.total) && totalRow && totalValue) {
          totalValue.textContent = formatAmps(telemetry.total);
          totalValue.classList.remove("unavailable");
          totalRow.hidden = false;
        } else if (totalRow && totalValue) {
          totalValue.textContent = "N/A";
          totalValue.classList.add("unavailable");
          totalRow.hidden = false;
        }

        if (Array.isArray(telemetry.strips) && stripList) {
          stripList.hidden = telemetry.strips.length === 0;
          telemetry.strips.forEach((strip) => {
            const item = document.createElement("li");
            const label = document.createElement("span");
            const value = document.createElement("span");

            label.className = "strip-label";
            value.className = "strip-value";

            label.textContent = strip.name;

            if (strip.available && Number.isFinite(strip.amps)) {
              value.textContent = formatAmps(strip.amps);
              value.classList.remove("unavailable");
            } else {
              value.textContent = "N/A";
              value.classList.add("unavailable");
            }

            item.append(label, value);
            stripList.appendChild(item);
          });

          if (stripList.childElementCount === 0 && emptyMessage) {
            emptyMessage.hidden = false;
          }
        }
      };

      stations.forEach((station) => {
        const { id, name } = station;
        const node = template.content.firstElementChild.cloneNode(true);
        node.querySelector(".station-name").textContent = name;
        node.dataset.stationId = id;

        node.querySelectorAll("button").forEach((button) => {
          button.addEventListener("click", () => {
            const command = button.dataset.command;
            sendCommand(station, command);
          });
        });

        dashboard.appendChild(node);
        stationElements.set(id, node);
      });

      const sendCommand = async (station, command) => {
        const url = `${station.baseUrl}/${command}`;

        try {
          await fetch(url, { method: "GET" });
        } catch (error) {
          console.error(`Failed to send ${command} to ${station.name}:`, error);
        } finally {
          setTimeout(refreshStatuses, 250);
        }
      };

      const refreshStatuses = async () => {
        await Promise.all(
          stations.map(async (station) => {
            const element = stationElements.get(station.id);
            if (!element) return;

            const status = await readStatus(station);
            if (!status) {
              applyState(
                element,
                "error",
                "Unable to retrieve status from this device."
              );
              applyTelemetry(element, null);
              return;
            }

            applyState(element, status.state, status.details);
            applyTelemetry(element, status.telemetry);
          })
        );
      };

      const readStatus = async (station) => {
        const url = `${station.baseUrl}/status`;

        try {
          const response = await fetch(url, {
            method: "GET",
            headers: { "Cache-Control": "no-cache" }
          });

          if (!response.ok) {
            throw new Error(`Status request failed with ${response.status}`);
          }

          const payload = await response.json();
          const state = String(payload?.power ?? "error").toLowerCase();
          const details =
            typeof payload?.details === "string" ? payload.details : "";

          const totalCurrentValue = Number(payload?.total_current);
          const strips = Array.isArray(payload?.strips)
            ? payload.strips.map((strip, index) => {
                const rawName =
                  typeof strip?.name === "string" ? strip.name.trim() : "";
                const name = rawName.length > 0 ? rawName : `Strip ${index + 1}`;
                const ampsValue = Number(strip?.current);
                const amps = Number.isFinite(ampsValue) ? ampsValue : null;
                const available =
                  strip?.current_available === true || Number.isFinite(amps);
                return { name, amps, available };
              })
            : [];

          return {
            state: state === "on" || state === "off" ? state : "error",
            details,
            telemetry: {
              total: Number.isFinite(totalCurrentValue) ? totalCurrentValue : null,
              strips
            }
          };
        } catch (error) {
          console.error(`Failed to read status for ${station.name}:`, error);
          return null;
        }
      };

      refreshStatuses();
      setInterval(refreshStatuses, 5000);
    </script>
  </body>
</html>
