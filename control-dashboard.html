<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Power Sequencer</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f3f4f6;
        --card-bg: #ffffff;
        --text: #1f2933;
        --muted: #52606d;
        --border: #d2d6dc;
        --accent: #2563eb;
        --on: #15803d;
        --off: #dc2626;
        --error: #b45309;
        --seq: #6366f1;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111827;
          --card-bg: #1f2937;
          --text: #f9fafb;
          --muted: #9ca3af;
          --border: #374151;
          --accent: #60a5fa;
          --on: #22c55e;
          --off: #f87171;
          --error: #fbbf24;
          --seq: #818cf8;
        }
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        padding: 2rem 1rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
      }

      header { text-align: center; width: 100%; max-width: 600px; display: flex; justify-content: space-between; align-items: center; }
      h1 { margin: 0; font-size: 1.5rem; }

      .main-card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 2rem;
        width: 100%;
        max-width: 600px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .hidden { display: none !important; }

      .status-banner {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem;
        border-radius: 0.75rem;
        background: color-mix(in srgb, var(--accent) 10%, transparent);
      }

      .state-badge {
        padding: 0.5rem 1rem;
        border-radius: 2rem;
        font-weight: bold;
        text-transform: uppercase;
        font-size: 0.875rem;
      }

      .state-badge[data-state="on"] { background: var(--on); color: white; }
      .state-badge[data-state="off"] { background: var(--off); color: white; }
      .state-badge[data-state="sequencing"] { background: var(--seq); color: white; animation: pulse 1.5s infinite; }
      .state-badge[data-state="error"] { background: var(--error); color: white; }

      @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.6; }
        100% { opacity: 1; }
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      button {
        padding: 0.75rem 1rem;
        border-radius: 0.5rem;
        border: none;
        font-weight: bold;
        cursor: pointer;
        font-size: 1rem;
        transition: opacity 0.2s;
      }

      button:active { transform: scale(0.98); }
      .btn-on { background: var(--on); color: white; }
      .btn-off { background: var(--off); color: white; }
      .btn-ghost { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
      .btn-primary { background: var(--accent); color: white; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }

      .strips-list {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .strip-item {
        display: flex;
        justify-content: space-between;
        padding: 0.75rem;
        border-bottom: 1px solid var(--border);
      }

      .strip-item:last-child { border-bottom: none; }
      .amps { font-weight: bold; color: var(--accent); }

      /* Settings Styles */
      .settings-row {
        display: flex;
        gap: 1rem;
        align-items: center;
        margin-bottom: 1rem;
      }
      .settings-row input {
        flex: 1;
        padding: 0.5rem;
        border-radius: 0.25rem;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
      }
      .settings-actions {
        display: flex;
        justify-content: flex-end;
        gap: 1rem;
        margin-top: 1rem;
      }

      footer { color: var(--muted); font-size: 0.875rem; text-align: center; }
    </style>
  </head>
  <body>
    <header>
      <h1>Power Sequencer</h1>
      <button id="btn-settings-toggle" class="btn-ghost" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;">⚙ Settings</button>
    </header>

    <!-- Main Control View -->
    <main id="view-main" class="main-card">
      <div class="status-banner">
        <span>System Status</span>
        <span id="system-state" class="state-badge" data-state="off">OFF</span>
      </div>

      <div class="controls">
        <button id="btn-on" class="btn-on">SEQUENCE ON</button>
        <button id="btn-off" class="btn-off">SEQUENCE OFF</button>
      </div>

      <div id="telemetry">
        <div class="strip-item">
          <strong>Total Load</strong>
          <span id="total-amps" class="amps">-- A</span>
        </div>
        <div id="strips-container" class="strips-list"></div>
      </div>
    </main>

    <!-- Settings View -->
    <main id="view-settings" class="main-card hidden">
      <h3>Rack Configuration</h3>
      <p style="font-size: 0.85rem; color: var(--muted); margin-bottom: 1.5rem;">Configure the name and IP address for each power strip.</p>

      <div id="config-list">
        <!-- Config rows added here -->
      </div>

      <div class="settings-actions">
        <button id="btn-config-cancel" class="btn-ghost">Cancel</button>
        <button id="btn-config-save" class="btn-primary">Save & Reboot</button>
      </div>
    </main>

    <footer>Refreshes every 5 seconds</footer>

    <script>
      const stateEl = document.getElementById('system-state');
      const totalEl = document.getElementById('total-amps');
      const container = document.getElementById('strips-container');
      const btnOn = document.getElementById('btn-on');
      const btnOff = document.getElementById('btn-off');

      const viewMain = document.getElementById('view-main');
      const viewSettings = document.getElementById('view-settings');
      const btnSettingsToggle = document.getElementById('btn-settings-toggle');
      const configList = document.getElementById('config-list');

      let currentConfig = [];

      async function update() {
        try {
          const res = await fetch('/status');
          const data = await res.json();

          stateEl.textContent = data.power.toUpperCase();
          stateEl.dataset.state = data.power;

          const isBusy = data.power === 'sequencing';
          btnOn.disabled = isBusy;
          btnOff.disabled = isBusy;

          totalEl.textContent = data.total_current.toFixed(2) + ' A';

          container.innerHTML = '';
          currentConfig = data.strips.map(s => ({ name: s.name, ip: s.ip }));

          data.strips.forEach(strip => {
            const div = document.createElement('div');
            div.className = 'strip-item';
            div.innerHTML = `
              <span>${strip.name}</span>
              <span class="amps">${strip.current_available ? strip.current.toFixed(2) + ' A' : 'N/A'}</span>
            `;
            container.appendChild(div);
          });
        } catch (e) {
          stateEl.textContent = 'CONN ERROR';
          stateEl.dataset.state = 'error';
        }
      }

      async function send(cmd) {
        try {
          stateEl.textContent = 'SENDING...';
          stateEl.dataset.state = 'sequencing';
          btnOn.disabled = true;
          btnOff.disabled = true;
          await fetch('/' + cmd);
          setTimeout(update, 500);
        } catch (e) {
          alert('Failed to send command');
          update();
        }
      }

      btnSettingsToggle.onclick = () => {
        if (viewSettings.classList.contains('hidden')) {
          renderSettings();
          viewMain.classList.add('hidden');
          viewSettings.classList.remove('hidden');
          btnSettingsToggle.textContent = '✕ Close';
        } else {
          viewMain.classList.remove('hidden');
          viewSettings.classList.add('hidden');
          btnSettingsToggle.textContent = '⚙ Settings';
        }
      };

      function renderSettings() {
        configList.innerHTML = '';
        currentConfig.forEach((strip, i) => {
          const div = document.createElement('div');
          div.className = 'settings-row';
          div.innerHTML = `
            <input type="text" value="${strip.name}" placeholder="Rack Name" data-index="${i}" data-field="name">
            <input type="text" value="${strip.ip}" placeholder="IP Address" data-index="${i}" data-field="ip">
          `;
          configList.appendChild(div);
        });
      }

      document.getElementById('btn-config-cancel').onclick = () => btnSettingsToggle.click();

      document.getElementById('btn-config-save').onclick = async () => {
        const inputs = configList.querySelectorAll('input');
        const newConfig = [];
        for (let i = 0; i < currentConfig.length; i++) {
          newConfig.push({
            name: configList.querySelector(`[data-index="${i}"][data-field="name"]`).value,
            ip: configList.querySelector(`[data-index="${i}"][data-field="ip"]`).value
          });
        }

        if (confirm('Save settings and reboot bridge?')) {
          try {
            const res = await fetch('/save_config', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(newConfig)
            });
            if (res.ok) {
              alert('Settings saved. Bridge is rebooting...');
              location.reload();
            } else {
              alert('Error saving settings.');
            }
          } catch (e) {
            alert('Failed to connect to bridge.');
          }
        }
      };

      btnOn.onclick = () => send('on');
      btnOff.onclick = () => send('off');

      setInterval(update, 5000);
      update();
    </script>
  </body>
</html>
