<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Power Sequencer</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f3f4f6;
        --card-bg: #ffffff;
        --text: #1f2933;
        --muted: #52606d;
        --border: #d2d6dc;
        --accent: #2563eb;
        --on: #15803d;
        --off: #dc2626;
        --error: #b45309;
        --seq: #6366f1;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111827;
          --card-bg: #1f2937;
          --text: #f9fafb;
          --muted: #9ca3af;
          --border: #374151;
          --accent: #60a5fa;
          --on: #22c55e;
          --off: #f87171;
          --error: #fbbf24;
          --seq: #818cf8;
        }
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        padding: 2rem 1rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
      }

      header { text-align: center; width: 100%; max-width: 600px; display: flex; justify-content: space-between; align-items: center; }
      h1 { margin: 0; font-size: 1.5rem; }

      .main-card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 2rem;
        width: 100%;
        max-width: 600px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .hidden { display: none !important; }

      .status-banner {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem;
        border-radius: 0.75rem;
        background: color-mix(in srgb, var(--accent) 10%, transparent);
      }

      .state-badge {
        padding: 0.5rem 1rem;
        border-radius: 2rem;
        font-weight: bold;
        text-transform: uppercase;
        font-size: 0.875rem;
      }

      .state-badge[data-state="on"] { background: var(--on); color: white; }
      .state-badge[data-state="off"] { background: var(--off); color: white; }
      .state-badge[data-state="sequencing"] { background: var(--seq); color: white; animation: pulse 1.5s infinite; }
      .state-badge[data-state="error"] { background: var(--error); color: white; }
      .state-badge[data-state="mixed"] { background: var(--error); color: white; }

      @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.6; }
        100% { opacity: 1; }
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      button, .btn-link {
        padding: 0.75rem 1rem;
        border-radius: 0.5rem;
        border: none;
        font-weight: bold;
        cursor: pointer;
        font-size: 1rem;
        transition: opacity 0.2s;
        text-decoration: none;
        text-align: center;
      }

      button:active { transform: scale(0.98); }
      .btn-on { background: var(--on); color: white; }
      .btn-off { background: var(--off); color: white; }
      .btn-ghost { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
      .btn-primary { background: var(--accent); color: white; }
      .btn-danger { background: var(--off); color: white; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }

      .strips-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .strip-card {
        border: 1px solid var(--border);
        border-radius: 0.75rem;
        padding: 1rem;
        background: color-mix(in srgb, var(--accent) 3%, transparent);
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .strip-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .strip-info { flex: 1; cursor: pointer; }

      .rack-title { font-weight: bold; }
      .amps { font-weight: bold; color: var(--accent); }

      .rack-controls {
        display: flex;
        gap: 0.4rem;
        align-items: center;
      }
      .rack-controls button, .rack-controls .btn-link {
        padding: 0.3rem 0.6rem;
        font-size: 0.7rem;
      }

      .outlets-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 0.5rem;
        margin-top: 0.5rem;
        padding-top: 1rem;
        border-top: 1px solid var(--border);
      }

      .outlet-item {
        display: flex;
        justify-content: space-between;
        font-size: 0.8rem;
        padding: 0.25rem 0.5rem;
        border-radius: 0.25rem;
        background: var(--bg);
        cursor: pointer;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 4px;
      }
      .dot.on { background: var(--on); box-shadow: 0 0 5px var(--on); }
      .dot.off { background: var(--off); opacity: 0.4; }

      /* Settings Styles */
      .settings-row {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        margin-bottom: 0.75rem;
      }
      .settings-row input {
        flex: 1;
        padding: 0.5rem;
        border-radius: 0.25rem;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        min-width: 0;
      }
      .settings-actions {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        margin-top: 1rem;
      }

      footer { color: var(--muted); font-size: 0.875rem; text-align: center; }
    </style>
  </head>
  <body>
    <header>
      <h1>Power Sequencer</h1>
      <button id="btn-settings-toggle" class="btn-ghost" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;">⚙ Settings</button>
    </header>

    <!-- Main Control View -->
    <main id="view-main" class="main-card">
      <div class="status-banner">
        <span>System Status</span>
        <span id="system-state" class="state-badge" data-state="off">OFF</span>
      </div>

      <div class="controls">
        <button id="btn-on" class="btn-on">SEQUENCE ON</button>
        <button id="btn-off" class="btn-off">SEQUENCE OFF</button>
      </div>

      <div class="strip-item" style="border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;">
        <strong>Total Load</strong>
        <span id="total-amps" class="amps" style="float: right;">-- A</span>
      </div>

      <div id="strips-container" class="strips-list"></div>
    </main>

    <!-- Settings View -->
    <main id="view-settings" class="main-card hidden">
      <h3>Rack Configuration</h3>
      <p style="font-size: 0.85rem; color: var(--muted); margin-bottom: 1.5rem;">Manage your power strips. Max 8 racks supported.</p>

      <div id="config-list"></div>

      <button id="btn-add-rack" class="btn-ghost" style="width: 100%; margin-top: 0.5rem;">+ Add Rack</button>

      <div class="settings-actions">
        <button id="btn-config-cancel" class="btn-ghost">Cancel</button>
        <button id="btn-config-save" class="btn-primary">Save Changes</button>
      </div>
    </main>

    <footer>Refreshes every 5 seconds</footer>

    <script>
      const stateEl = document.getElementById('system-state');
      const totalEl = document.getElementById('total-amps');
      const container = document.getElementById('strips-container');
      const btnOn = document.getElementById('btn-on');
      const btnOff = document.getElementById('btn-off');

      const viewMain = document.getElementById('view-main');
      const viewSettings = document.getElementById('view-settings');
      const btnSettingsToggle = document.getElementById('btn-settings-toggle');
      const configList = document.getElementById('config-list');
      const btnAddRack = document.getElementById('btn-add-rack');

      let currentConfig = [];
      let expandedRacks = new Set();

      async function update() {
        try {
          const res = await fetch('/status');
          const data = await res.json();

          stateEl.textContent = data.power.toUpperCase();
          stateEl.dataset.state = data.power;

          const isBusy = data.power === 'sequencing';
          btnOn.disabled = isBusy;
          btnOff.disabled = isBusy;

          totalEl.textContent = data.total_current.toFixed(2) + ' A';

          container.innerHTML = '';
          currentConfig = data.strips.map(s => ({ name: s.name, ip: s.ip }));

          data.strips.forEach((strip, i) => {
            const card = document.createElement('div');
            card.className = 'strip-card';

            const isExpanded = expandedRacks.has(i);

            card.innerHTML = `
              <div class="strip-header">
                <div class="strip-info" onclick="toggleRack(${i})">
                  <span class="rack-title">${strip.name}</span>
                  <span class="amps">${strip.current_available ? strip.current.toFixed(2) + ' A' : 'OFFLINE'}</span>
                </div>
                <div class="rack-controls">
                  <a href="http://${strip.ip}" target="_blank" class="btn-link btn-ghost">🔗 Admin</a>
                  <button class="btn-on" onclick="controlRack(${i}, 'on')">ON</button>
                  <button class="btn-off" onclick="controlRack(${i}, 'off')">OFF</button>
                </div>
              </div>
              <div class="outlets-grid ${isExpanded ? '' : 'hidden'}">
                ${strip.outlets ? strip.outlets.map((o, j) => `
                  <div class="outlet-item" onclick="renameOutlet(${i}, ${j}, '${o.name}')">
                    <span><span class="dot ${o.state ? 'on' : 'off'}"></span> ${o.name}</span>
                    <span style="opacity: 0.6">${o.state ? 'ON' : 'OFF'}</span>
                  </div>
                `).join('') : '<p style="font-size: 0.7rem; opacity: 0.5;">No outlet telemetry</p>'}
              </div>
            `;
            container.appendChild(card);
          });
        } catch (e) {
          stateEl.textContent = 'CONN ERROR';
          stateEl.dataset.state = 'error';
        }
      }

      window.toggleRack = (i) => {
        if (expandedRacks.has(i)) expandedRacks.delete(i);
        else expandedRacks.add(i);
        update();
      };

      window.controlRack = async (i, cmd) => {
        try {
          await fetch(`/rack/${i}/${cmd}`);
          setTimeout(update, 500);
        } catch (e) { alert('Rack control failed'); }
      };

      window.renameOutlet = async (rackIdx, outletIdx, currentName) => {
        const newName = prompt(`Enter new name for "${currentName}":`, currentName);
        if (newName && newName !== currentName) {
          try {
            const res = await fetch(`/rack/${rackIdx}/outlet/${outletIdx}/rename`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name: newName })
            });
            if (res.ok) update();
            else alert('Rename failed');
          } catch (e) { alert('Connection error during rename'); }
        }
      };

      async function send(cmd) {
        try {
          stateEl.textContent = 'SENDING...';
          stateEl.dataset.state = 'sequencing';
          btnOn.disabled = true;
          btnOff.disabled = true;
          await fetch('/' + cmd);
          setTimeout(update, 500);
        } catch (e) {
          alert('Failed to send command');
          update();
        }
      }

      btnSettingsToggle.onclick = () => {
        if (viewSettings.classList.contains('hidden')) {
          renderSettings();
          viewMain.classList.add('hidden');
          viewSettings.classList.remove('hidden');
          btnSettingsToggle.textContent = '✕ Close';
        } else {
          viewMain.classList.remove('hidden');
          viewSettings.classList.add('hidden');
          btnSettingsToggle.textContent = '⚙ Settings';
        }
      };

      function renderSettings() {
        configList.innerHTML = '';
        currentConfig.forEach((strip, i) => {
          const div = document.createElement('div');
          div.className = 'settings-row';
          div.innerHTML = `
            <input type="text" value="${strip.name}" placeholder="Name" onchange="currentConfig[${i}].name=this.value">
            <input type="text" value="${strip.ip}" placeholder="IP" onchange="currentConfig[${i}].ip=this.value">
            <button class="btn-danger" style="padding: 0.5rem;" onclick="removeRack(${i})">✕</button>
          `;
          configList.appendChild(div);
        });
        btnAddRack.disabled = currentConfig.length >= 8;
      }

      function removeRack(i) {
        currentConfig.splice(i, 1);
        renderSettings();
      }

      btnAddRack.onclick = () => {
        if (currentConfig.length < 8) {
          currentConfig.push({ name: '', ip: '' });
          renderSettings();
        }
      };

      document.getElementById('btn-config-cancel').onclick = () => btnSettingsToggle.click();

      document.getElementById('btn-config-save').onclick = async () => {
        if (confirm('Save settings?')) {
          try {
            const res = await fetch('/save_config', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(currentConfig)
            });
            if (res.ok) {
              alert('Settings saved.');
              btnSettingsToggle.click();
              update();
            } else {
              alert('Error saving settings.');
            }
          } catch (e) {
            alert('Failed to connect to bridge.');
          }
        }
      };

      btnOn.onclick = () => send('on');
      btnOff.onclick = () => send('off');

      setInterval(update, 5000);
      update();
    </script>
  </body>
</html>
